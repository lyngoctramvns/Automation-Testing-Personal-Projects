name: Run Pytest Automation Suite on Push to Main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Pytest Automation Suite
        run: |
          python -m pytest --alluredir allure-results
        continue-on-error: true   # pipeline continues even on test failures
      - name: Generate Allure Report # Command is diffrent bc it won't be run on locals
        if: always()  # Ensure this step runs even if previous steps fail
        run: |
          npx allure-commandline generate allure-results --clean -o allure-report
      - name: Upload Allure Report # Upload the generated Allure report as an artifact => index.html will be available for download in the Actions tab
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
